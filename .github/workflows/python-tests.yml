name: Run Python tests

on:
  push:
    # Run when a change to these files is pushed to any branch. Without the "branches:" line, for some reason this will be run whenever a tag is pushed, even if the listed files aren't changed.
    branches: ['*']
    paths:
      - 'python/**'
      - 'cime_config/SystemTests/**'
      - 'cime_config/buildlib/**'
      - 'cime_config/buildnml/**'
  pull_request:
    # Run on pull requests that change the listed files
    paths:
      - 'python/**'
      - 'cime_config/SystemTests/**'
      - 'cime_config/buildlib/**'
      - 'cime_config/buildnml/**'

jobs:
  python-unit-tests:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Set up the conda/mamba environment
      - name: Set up conda/mamba environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          environment-name: ctsm_pylib
          environment-file: python/conda_env_ctsm_py.yml
          cache-environment: true
          cache-downloads: true

      # Run Python unit tests check
      - name: Run Python unit tests
        run: |
          cd python
          micromamba run -n ctsm_pylib ./run_ctsm_py_tests -u

  python-lint-and-black:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Set up the conda/mamba environment
      - name: Set up conda/mamba environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          environment-name: ctsm_pylib
          environment-file: python/conda_env_ctsm_py.yml
          cache-environment: true
          cache-downloads: true

      # Run pylint check
      - name: Run pylint
        run: |
          cd python
          micromamba run -n ctsm_pylib make lint

      # Run black check
      - name: Run black
        # Run this step even if previous step(s) failed
        if: success() || failure()
        run: |
          cd python
          micromamba run -n ctsm_pylib make black
